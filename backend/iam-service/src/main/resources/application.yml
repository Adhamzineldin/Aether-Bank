server:
  port: 4333

spring:
  application:
    name: iam-service

  # PostgreSQL Connection (Matches your Docker Compose)
  datasource:
    url: jdbc:postgresql://localhost:5433/iam_service
    username: root
    password: password
  jpa:
    hibernate:
      ddl-auto: update # Automatically creates your database tables from your Java code
    show-sql: true     # Prints SQL to your console for debugging

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

security:
  jwt:
    # Must match the gateway verifier key for token validation/routing.
    secret: ${JWT_SECRET:change-this-to-a-long-shared-secret-at-least-32-characters}
    expiration-ms: 3600000
    issuer: "iam-service"
