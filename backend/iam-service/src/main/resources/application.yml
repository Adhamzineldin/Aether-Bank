server:
  port: ${SERVER_PORT:8085}
  servlet:
    context-path: /

spring:
  application:
    name: iam-service
  
  # PostgreSQL Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5433/iam_db}}
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:mahi234}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # Logging Configuration
  logging:
    level:
      root: INFO
      com.maayn.iamservice: DEBUG
      org.springframework.security: DEBUG
      org.springframework.web: DEBUG

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-must-be-at-least-32-characters-long-for-security}
  expiration-ms: ${JWT_EXPIRATION_MS:900000}  # 15 minutes
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7 days
  issuer: "iam-service"

# Eureka Service Discovery
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.maayn.iamservice: DEBUG
    org.springframework.security: DEBUG
  file:
    name: logs/iam-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 10

