server:
  port: 2501

spring:
  application:
    name: transaction-service

  # PostgreSQL Connection (Matches your Docker Compose)
  datasource:
    url: jdbc:postgresql://localhost:5433/postgres
    username: root
    password: password
  jpa:
    hibernate:
      ddl-auto: update # Automatically creates your database tables from your Java code
    show-sql: true     # Prints SQL to your console for debugging

  # RabbitMQ Connection (Matches your Docker Compose)
  rabbitmq:
    host: localhost
    port: 5672

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/