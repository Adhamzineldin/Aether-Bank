server:
  port: ${SERVER_PORT:8087}

spring:
  application:
    name: audit-service

  mongodb:
    uri: ${SPRING_MONGODB_URI:mongodb://localhost:27018/audit_db?uuidRepresentation=STANDARD}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}