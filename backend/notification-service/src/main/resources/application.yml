server:
  port: ${SERVER_PORT:3030}

spring:
  application:
    name: notification-service

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/notification_db}
      auto-index-creation: true
      uuid-representation: standard

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:${MAIL_USERNAME:}}
    password: ${SPRING_MAIL_PASSWORD:${MAIL_PASSWORD:}}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

logging:
  level:
    com.maayn.notificationservice: DEBUG
    org.springframework.data.mongodb: INFO
