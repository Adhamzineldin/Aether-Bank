server:
  port: ${SERVER_PORT:3030}

spring:
  application:
    name: notification-service

  # Legacy repositories in `com.maayn.notificationservice.repository` and the
  # document-backed repositories in `com.maayn.notificationservice.repositories`
  # share interface names (WorkflowInstanceRepository, etc.). Both are still
  # wired into different code paths so we enable override until the two layers
  # are unified behind a single repository package.
  main:
    allow-bean-definition-overriding: true

  data:
    mongodb:
      auto-index-creation: true
  mongodb:
    uri: ${SPRING_MONGODB_URI:${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/notification_db}}
    representation:
      uuid: standard

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:${MAIL_USERNAME:}}
    password: ${SPRING_MAIL_PASSWORD:${MAIL_PASSWORD:}}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

logging:
  level:
    com.maayn.notificationservice: DEBUG
    org.springframework.data.mongodb: INFO

# Recipient resolution. Both URLs are templated with placeholders the
# notification-service substitutes at call time.
#   - contact-lookup keyed by accountId  -> account-service joins to iam
#   - user-contact keyed by userId       -> hits iam-service directly
# Defaulted to the in-cluster URLs so docker-compose works out of the box;
# overridable via env for other environments.
notification:
  contact-lookup:
    url-template: ${NOTIFICATION_CONTACT_LOOKUP_URL_TEMPLATE:http://account-service:8081/api/accounts/{accountId}/contact}
  user-contact:
    url-template: ${NOTIFICATION_USER_CONTACT_URL_TEMPLATE:http://iam-service:8085/api/internal/users/{userId}/email}
  email:
    fallback-to: ${NOTIFICATION_EMAIL_FALLBACK_TO:}

