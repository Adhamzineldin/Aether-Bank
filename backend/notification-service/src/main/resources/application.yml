server:
  port: 3030

spring:
  application:
    name: workflow-notification-service

  mongodb:
    uri: mongodb://localhost:27030/workflow_notification_service

  rabbitmq:
    host: localhost
    port: 5673

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# Transfer alerts (Rabbit): see NotificationRabbitConfig + TransferEventListener.
# Optional: notification.contact-lookup.url-template — GET with {accountId} → {"email":"..."} for transfer emails.
#
# API notification send (EMAIL): optional notification.user-contact.url-template — GET with {userId} → {"email":"..."}
# or notification.email.fallback-to for internal/dev delivery when IAM lookup is not wired.

eureka:
  client:
    service-url:
      default-zone: http://localhost:8761/eureka/
#      How other services will find me (hostname or ip) // check this one Adham
#  instance:
#    prefer-ip-address: true

logging:
  level:
    com.maayn.notificationservice: DEBUG
    org.springframework.data.mongodb: DEBUG